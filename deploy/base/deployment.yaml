# =============================================================================
# deploy/base — namespace-agnostic Kubernetes resources.
# Do not apply this directly. Use an overlay (overlays/dev or overlays/prod).
# =============================================================================

# ── ServiceAccount ────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: commvault-mcp
  labels:
    app.kubernetes.io/name: commvault-mcp
    app.kubernetes.io/component: mcp-server

---
# ── ClusterRole ───────────────────────────────────────────────────────────────
# Grants access to Commvault workload namespaces only.
# Protected namespaces are blocked at the application layer via PROTECTED_NAMESPACES.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: commvault-mcp
  labels:
    app.kubernetes.io/name: commvault-mcp
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "services", "namespaces",
                "persistentvolumeclaims", "configmaps", "secrets",
                "serviceaccounts", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots", "volumesnapshotcontents", "volumesnapshotclasses"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: commvault-mcp
  labels:
    app.kubernetes.io/name: commvault-mcp
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: commvault-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: commvault-mcp
        app.kubernetes.io/component: mcp-server
    spec:
      serviceAccountName: commvault-mcp
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: mcp-server
          image: REPLACE_ME_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8403
              protocol: TCP
          env:
            - name: MCP_TRANSPORT
              value: "http"
            - name: PORT
              value: "8403"
            - name: HOST
              value: "0.0.0.0"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: commvault-mcp-auth
                  key: MCP_AUTH_TOKEN
            - name: PROTECTED_NAMESPACES
              value: "kube-system,kube-public,kube-node-lease"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8403
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8403
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: helm-cache
              mountPath: /tmp/helm
      volumes:
        - name: helm-cache
          emptyDir: {}

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: commvault-mcp
  labels:
    app.kubernetes.io/name: commvault-mcp
    app.kubernetes.io/component: mcp-server
  annotations:
    service.beta.kubernetes.io/oci-load-balancer-internal: "true"
spec:
  selector:
    app.kubernetes.io/name: commvault-mcp
  ports:
    - name: http
      port: 8403
      targetPort: 8403
      protocol: TCP
