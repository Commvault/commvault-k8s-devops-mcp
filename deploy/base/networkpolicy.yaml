apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: commvault-mcp
  labels:
    app.kubernetes.io/name: commvault-mcp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: commvault-mcp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8403
  egress:
    # Unrestricted outbound: required for kubectl (K8s API), helm repo pulls, image registries.
    - {}
