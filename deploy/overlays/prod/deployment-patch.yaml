# Deployment strategic-merge patch for production.
# Replace REPLACE_WITH_YOUR_IMAGE:TAG with your registry image before applying.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: commvault-mcp
spec:
  template:
    spec:
      containers:
        - name: mcp-server
          image: REPLACE_WITH_YOUR_IMAGE:TAG
          env:
            - name: MCP_AUTH_MODE
              value: "static-bearer"
            - name: CV_NAMESPACE
              value: "commvault"
            - name: PROTECTED_NAMESPACES
              value: "kube-system,kube-public,kube-node-lease,commvault-mcp"
            - name: MCP_MAX_SESSIONS
              value: "20"
            - name: MCP_SESSION_IDLE_TTL_MS
              value: "600000"
